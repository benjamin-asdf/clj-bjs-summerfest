# Summer Fest — proxy /summerfest/* to the Clojure app.
# The app's middleware strips the /summerfest prefix from :uri so internal
# routes stay defined as /, /chat, etc. We deliberately use proxy_pass with
# NO trailing slash so the prefix is preserved on the wire.
location ^~ /summerfest {
    proxy_pass http://127.0.0.1:8096;
    proxy_http_version 1.1;

    # WebSocket upgrade (used by /summerfest/party/ws).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /summerfest;

    # SSE (chat stream) and WebSocket need streaming, not buffering.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    # Photo uploads.
    client_max_body_size 50m;
}
